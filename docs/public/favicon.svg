<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="react-klinecharts-ui">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1a2f"/>
      <stop offset="1" stop-color="#0a1220"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#1e2d4a" stroke-width="1"/>
  <!-- trend line through the candles -->
  <path d="M5 20 L11 14 L16 17 L21 9 L27 12" fill="none" stroke="#2563eb" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- bullish candle -->
  <line x1="11" y1="6" x2="11" y2="26" stroke="#2DC08E" stroke-width="2" stroke-linecap="round"/>
  <rect x="8.5" y="11" width="5" height="10" rx="1.2" fill="#2DC08E"/>
  <!-- bearish candle -->
  <line x1="21" y1="6" x2="21" y2="27" stroke="#F92855" stroke-width="2" stroke-linecap="round"/>
  <rect x="18.5" y="13" width="5" height="9" rx="1.2" fill="#F92855"/>
</svg>
