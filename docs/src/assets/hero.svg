<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" width="560" height="440" role="img" aria-label="Trading terminal chart built with react-klinecharts-ui">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1d36"/>
      <stop offset="1" stop-color="#0a1322"/>
    </linearGradient>
    <linearGradient id="maGlow" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- card -->
  <rect x="2" y="2" width="556" height="436" rx="16" fill="url(#card)" stroke="#1e2d4a" stroke-width="1.5"/>

  <!-- header -->
  <circle cx="28" cy="30" r="5" fill="#2DC08E"/>
  <text x="40" y="35" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#e6edf6">BTC/USDT</text>
  <text x="128" y="35" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#6b7da3">· 1H</text>
  <text x="540" y="35" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#2DC08E">▲ 45,210  +1.8%</text>
  <line x1="16" y1="48" x2="544" y2="48" stroke="#1a2840" stroke-width="1"/>

  <!-- horizontal grid -->
  <g stroke="#16233c" stroke-width="1" stroke-dasharray="2 5">
    <line x1="16" y1="95" x2="500" y2="95"/>
    <line x1="16" y1="160" x2="500" y2="160"/>
    <line x1="16" y1="225" x2="500" y2="225"/>
    <line x1="16" y1="290" x2="500" y2="290"/>
  </g>

  <!-- bollinger-style band behind candles -->
  <path d="M60 232 C150 210 260 150 360 128 L450 96 L450 150 C360 175 260 220 150 258 L60 278 Z" fill="url(#band)"/>

  <!-- MA glow + line -->
  <path d="M60 276 C110 268 130 250 150 246 C190 238 200 208 240 204 C275 200 290 178 300 168 C330 160 345 152 360 150 C400 142 420 126 450 120 L450 320 L60 320 Z" fill="url(#maGlow)"/>
  <path d="M60 276 C110 268 130 250 150 246 C190 238 200 208 240 204 C275 200 290 178 300 168 C330 160 345 152 360 150 C400 142 420 126 450 120"
        fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- candles -->
  <g stroke-linecap="round">
    <!-- bearish -->
    <g stroke="#F92855" fill="#F92855">
      <line x1="60"  y1="250" x2="60"  y2="290" stroke-width="2"/><rect x="53"  y="260" width="14" height="25" rx="2"/>
      <line x1="150" y1="218" x2="150" y2="258" stroke-width="2"/><rect x="143" y="232" width="14" height="18" rx="2"/>
      <line x1="240" y1="180" x2="240" y2="218" stroke-width="2"/><rect x="233" y="195" width="14" height="17" rx="2"/>
      <line x1="330" y1="145" x2="330" y2="175" stroke-width="2"/><rect x="323" y="158" width="14" height="12" rx="2"/>
      <line x1="420" y1="110" x2="420" y2="140" stroke-width="2"/><rect x="413" y="122" width="14" height="13" rx="2"/>
    </g>
    <!-- bullish -->
    <g stroke="#2DC08E" fill="#2DC08E">
      <line x1="90"  y1="240" x2="90"  y2="285" stroke-width="2"/><rect x="83"  y="255" width="14" height="25" rx="2"/>
      <line x1="120" y1="225" x2="120" y2="262" stroke-width="2"/><rect x="113" y="232" width="14" height="26" rx="2"/>
      <line x1="180" y1="205" x2="180" y2="250" stroke-width="2"/><rect x="173" y="215" width="14" height="33" rx="2"/>
      <line x1="210" y1="188" x2="210" y2="220" stroke-width="2"/><rect x="203" y="195" width="14" height="20" rx="2"/>
      <line x1="270" y1="165" x2="270" y2="214" stroke-width="2"/><rect x="263" y="175" width="14" height="35" rx="2"/>
      <line x1="300" y1="150" x2="300" y2="180" stroke-width="2"/><rect x="293" y="158" width="14" height="20" rx="2"/>
      <line x1="360" y1="130" x2="360" y2="172" stroke-width="2"/><rect x="353" y="138" width="14" height="30" rx="2"/>
      <line x1="390" y1="115" x2="390" y2="145" stroke-width="2"/><rect x="383" y="122" width="14" height="20" rx="2"/>
      <line x1="450" y1="95"  x2="450" y2="138" stroke-width="2"/><rect x="443" y="105" width="14" height="30" rx="2"/>
    </g>
  </g>

  <!-- order line (dashed) with price tag -->
  <line x1="16" y1="160" x2="500" y2="160" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="500" y="150" width="44" height="20" rx="3" fill="#f59e0b"/>
  <text x="522" y="164" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1205">44.8k</text>

  <!-- price axis labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5a6b8c" text-anchor="start">
    <text x="506" y="99">46.0k</text>
    <text x="506" y="229">43.4k</text>
    <text x="506" y="294">42.1k</text>
  </g>

  <!-- volume sub-pane -->
  <line x1="16" y1="345" x2="500" y2="345" stroke="#1a2840" stroke-width="1"/>
  <g opacity="0.85">
    <rect x="53"  y="392" width="14" height="20" rx="1.5" fill="#F92855" opacity="0.55"/>
    <rect x="83"  y="380" width="14" height="32" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="113" y="372" width="14" height="40" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="143" y="386" width="14" height="26" rx="1.5" fill="#F92855" opacity="0.55"/>
    <rect x="173" y="368" width="14" height="44" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="203" y="388" width="14" height="24" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="233" y="382" width="14" height="30" rx="1.5" fill="#F92855" opacity="0.55"/>
    <rect x="263" y="364" width="14" height="48" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="293" y="390" width="14" height="22" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="323" y="384" width="14" height="28" rx="1.5" fill="#F92855" opacity="0.55"/>
    <rect x="353" y="370" width="14" height="42" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="383" y="378" width="14" height="34" rx="1.5" fill="#2DC08E" opacity="0.55"/>
    <rect x="413" y="392" width="14" height="20" rx="1.5" fill="#F92855" opacity="0.55"/>
    <rect x="443" y="360" width="14" height="52" rx="1.5" fill="#2DC08E" opacity="0.55"/>
  </g>

  <!-- time axis labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5a6b8c" text-anchor="middle">
    <text x="90"  y="428">09:00</text>
    <text x="210" y="428">12:00</text>
    <text x="330" y="428">15:00</text>
    <text x="450" y="428">18:00</text>
  </g>
</svg>
