name: Deploy Docs & Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build library
        run: pnpm build

      # Docs are the default site (served at the Pages root).
      - name: Build docs
        working-directory: docs
        run: pnpm build

      # The example app is deployed alongside the docs under /examples/.
      - name: Build example
        working-directory: examples
        run: pnpm build

      # Assemble a single Pages artifact: docs at the root, demo under /examples/.
      - name: Assemble site
        run: |
          mkdir -p site
          cp -r docs/dist/. site/
          mkdir -p site/examples
          cp -r examples/dist/. site/examples/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
