name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded run when a branch is pushed again.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Frozen lockfile: CI must fail (not silently regenerate) if the committed
      # pnpm-lock.yaml is out of sync with package.json.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck library
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build library
        run: pnpm build

      - name: Typecheck examples
        working-directory: examples
        run: npx tsc --noEmit

      - name: Build examples
        working-directory: examples
        run: pnpm build
